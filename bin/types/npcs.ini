Peek="Peek" skill of NPC (Byte)
Magic="Magic" skill of NPC (Byte)
Melee="Melee" skill of NPC (Byte)
Ranged Weapons="Ranged Weapons" skill of NPC (Byte)
Level=Level of NPC (Byte)
Experience=Experience of NPC (Word)
Equipped item type count=Amount of equipped items (Cardinal)
Equipped item type 0=Item type ID of first equipped item (Cardinal)
...
Equipped item type (Amount of equipped items - 1)=Item type ID of last equipped item (Cardinal)
CProp count=Amount of CPprops (Cardinal)
CProp 0 name=Name of first CProp (String)
CProp 0 string value=String value of first CProp (String)
CProp 0 integer value=Integer value of first CProp (Integer)
...
CProp (Amount of CProps - 1) name=Name of last CProp (String)
CProp (Amount of CProps - 1) string value=String value of last CProp (String)
CProp (Amount of CProps - 1) integer value=Integer value of last CProp (Integer)

