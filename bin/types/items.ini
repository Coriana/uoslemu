// description
[Item 0]
Script name=Name of script (String)
Walkable=Direction in which item is walkable (Byte)
Amount=Amount of items in stack (Word)
Lighting=Lighting of item (Byte)
Graphic=Graphic of item (Word)
Gump=Container gump ID (Word)
Default insert position X=X position where an item appears by default in the container (Word)
Default insert position Y=Y position where an item appears by default in the container (Word)
Color=Color of item (Word)
Invisible=Is the item invisible? Answer (Byte): 0 = No, 1 = Yes
Stackable=Is the item stackable? Answer (Byte): 0 = No, 1 = Yes
Moveable=Is the item Moveable? Answer (Byte): 0 = No, 1 = Yes
Weight=Weigth of item (Word)
Weapon=Is the item a weapon? Answer (Byte): 0 = No, 1 = Yes
Weapon speed=Speed of weapon (Byte)
Weapon damage=Damage of weapon (Byte)
Armor=Is the item an armor? Answer (Byte): 0 = No, 1 = Yes
Armor strength=Strength of armor (Byte)
Container=Is the item a container? Answer (Byte): 0 = No, 1 = Yes
Contained item type count=Amount of contained items (Cardinal)
Contained item type 0=Item type ID of first contained item (Cardinal)
...
Contained item type (Amount of contained items - 1)=Item type ID of last contained item (Cardinal)
CProp count=Amount of CPprops (Cardinal)
CProp 0 name=Name of first CProp (String)
CProp 0 string value=String value of first CProp (String)
CProp 0 integer value=Integer value of first CProp (Integer)
...
CProp (Amount of CProps - 1) name=Name of last CProp (String)
CProp (Amount of CProps - 1) string value=String value of last CProp (String)
CProp (Amount of CProps - 1) integer value=Integer value of last CProp (Integer)

