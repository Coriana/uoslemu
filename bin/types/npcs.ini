Graphic=Graphic of NPC (Word)
Facing=Facing of NPC (Byte)
Criminal=Is the NPC criminal? Answer (Byte): 0 = No, 1 = Yes
Privileged=Is the NPC privileged? Answer (Byte): 0 = No, 1 = Yes
Hidden=Is the NPC hidden? Answer (Byte): 0 = No, 1 = Yes
War=Is the NPC at war? Answer (Byte): 0 = No, 1 = Yes
